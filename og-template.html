<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    
    body {
      width: 1200px;
      height: 630px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f11;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    
    /* Subtle gradient overlay */
    .gradient-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(245, 158, 11, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }
    
    /* Grid pattern */
    .grid-pattern {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 80px;
    }
    
    .logo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 40px;
    }
    
    .logo {
      width: 64px;
      height: 64px;
    }
    
    .logo-text {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    
    .tagline {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 32px;
      letter-spacing: -0.03em;
      background: linear-gradient(to right, #fff 0%, #f5f5f5 50%, #d4d4d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .highlight {
      color: #f59e0b;
      -webkit-text-fill-color: #f59e0b;
    }
    
    .agents-section {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 48px;
    }
    
    .agent-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
    }
    
    .agent-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    .url {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 20px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="grid-pattern"></div>
  
  <div class="content">
    <div class="logo-section">
      <svg class="logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#F59E0B"/>
        <path d="M8 12C8 9.79086 9.79086 8 12 8H20C22.2091 8 24 9.79086 24 12V20C24 22.2091 22.2091 24 20 24H12C9.79086 24 8 22.2091 8 20V12Z" fill="white" fill-opacity="0.9"/>
        <path d="M12 14H20M12 18H17" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">ProductOS</span>
    </div>
    
    <h1 class="tagline">
      Ship Products <span class="highlight">10x Faster</span><br/>with AI
    </h1>
    
    <div class="agents-section">
      <div class="agent-pill">
        <span class="agent-icon">🎯</span>
        <span>Strategy</span>
      </div>
      <div class="agent-pill">
        <span class="agent-icon">🎨</span>
        <span>Design</span>
      </div>
      <div class="agent-pill">
        <span class="agent-icon">💻</span>
        <span>Develop</span>
      </div>
      <div class="agent-pill">
        <span class="agent-icon">🚀</span>
        <span>Launch</span>
      </div>
      <div class="agent-pill">
        <span class="agent-icon">📈</span>
        <span>Scale</span>
      </div>
    </div>
  </div>
  
  <div class="url">www.productos.dev</div>
</body>
</html>
